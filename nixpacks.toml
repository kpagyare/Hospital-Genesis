[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.json", "php82Extensions.bcmath", "php82Extensions.openssl", "php82Extensions.fileinfo", "php82Extensions.gd", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "php artisan storage:link --force; php artisan migrate --force && php artisan db:seed --force; php artisan config:cache; php artisan route:cache; php artisan serve --host=0.0.0.0 --port=$PORT"
